<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bake My Home India</title>

<style>

body {
  margin: 0;
  font-family: "Poppins", sans-serif;

  /* 🎂 New Cake-Themed Background */
  background: url("https://images.unsplash.com/photo-1606313564200-109d2adfe8d2")
  no-repeat center/cover;

  min-height: 100vh;
}

/* ===== Top Header Line ===== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 30px;
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.6);
}

.email {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
}

/* ===== Logo (Temporary Placeholder) ===== */
.logo {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: white;
  border: 2px solid #e6b7c9;
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #c44a7d;
}

/* ===== Buttons ===== */
.contact-btn {
  padding: 10px 22px;
  border-radius: 40px;
  border: none;
  background: #ff6fa8;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: .25s;
}

.contact-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255, 111, 168, .45);
}

/* ===== Search Bar ===== */
.search-box {
  margin: 120px auto 0;
  width: 60%;
  display: flex;
  align-items: center;
  padding: 12px 18px;
  border-radius: 40px;
  background: rgba(255, 255, 255, .65);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, .6);
  box-shadow: 0 15px 35px rgba(0,0,0,.25);
}

.search-box input {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
}

/* ===== Navigation ===== */
nav {
  margin-top: 22px;
  display: flex;
  justify-content: center;
  gap: 32px;
  font-weight: 600;
}

nav a {
  text-decoration: none;
  color: #222;
  position: relative;
}

nav a:hover {
  color: #ff4f93;
}

/* underline effect */
nav a::after {
  content:"";
  position:absolute;
  left:0;
  bottom:-5px;
  width:0%;
  height:2px;
  background:#ff4f93;
  transition:.3s;
}
nav a:hover::after { width:100%; }

/* ===== Hero Title ===== */
.hero-title {
  text-align:center;
  margin-top:40px;
  font-size:46px;
  font-weight:900;
  color:white;
  text-shadow:0 8px 30px rgba(0,0,0,.7);
}

</style>
</head>

<body>

<!-- ===== Top Header ===== -->
<div class="topbar">

  <div class="email">✉ HomeBakerIndia@gmail.com</div>

  <div class="actions">
    👤 My Account
    <button class="contact-btn">CONTACT US</button>
  </div>

</div>

<!-- ===== Temporary Logo Badge (Replace Later) ===== -->
<div class="logo">
  LOGO
</div>

<!-- ===== Search Bar ===== -->
<div class="search-box">
  <input type="text" placeholder="Search By Shop Name Or City">
  🔍
</div>

<!-- ===== Navigation ===== -->
<nav>
  <a href="#">Home</a>
  <a href="#">Shop</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
  <a href="#">Login</a>
</nav>

<!-- ===== Main Title ===== -->
<h1 class="hero-title">
  Bake My Home In Chennai
</h1>

</body>
</html>
