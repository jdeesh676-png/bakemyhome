<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakeTimeStories</title>

<style>

body{
 margin:0;
 font-family:"Poppins",sans-serif;
 background:#051622;
 color:#fff;
}

/* ===========================
 HEADER
===========================*/
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:14px 26px;
 background:linear-gradient(145deg,#0f2635,#071821);
 border-bottom:1px solid #1ef2ff44;
 box-shadow:0 12px 30px rgba(0,0,0,.45);
}

.actions button{
 background:#00e5ff;
 border:none;
 padding:10px 22px;
 border-radius:40px;
 font-weight:700;
 cursor:pointer;
 color:#00131a;
}

/* ===========================
 SUCCESS POPUP (NEW)
===========================*/
.popup-overlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:999;
}

.success-box{
 width:360px;
 padding:22px;
 text-align:center;
 border-radius:18px;
 background:linear-gradient(145deg,#081e2b,#0d2d3f);
 border:1px solid #19ffd6;
 box-shadow:
  0 20px 40px rgba(0,0,0,.6),
  0 0 20px #0ff;
 animation:pop .4s ease;
}
@keyframes pop{
 from{transform:scale(.8);opacity:0;}
 to{transform:scale(1);opacity:1;}
}

.success-box .tick{
 font-size:48px;
 color:#30ffa7;
}

.success-box button{
 margin-top:12px;
 padding:10px 20px;
 border-radius:14px;
 border:none;
 background:#00e5ff;
 font-weight:700;
 cursor:pointer;
}

/* ===========================
 CONTACT FORM POPUP (NEW)
===========================*/
.popup{
 width:360px;
 padding:18px;
 background:linear-gradient(145deg,#0b2230,#0e2f43);
 border-radius:18px;
 border:1px solid #19ffd6;
 box-shadow:0 20px 40px rgba(0,0,0,.6);
 animation:pop .4s ease;
}

.popup label{
 font-weight:700;
}
.popup input,
.popup textarea{
 width:100%;
 margin-top:6px;
 padding:10px;
 border-radius:12px;
 border:none;
 background:#112f45;
 color:#fff;
}
.popup-buttons button{
 width:100%;
 margin-top:10px;
 padding:12px;
 border-radius:14px;
 border:none;
 font-weight:800;
 cursor:pointer;
}
.wbtn{background:#1fd366;}
.ebtn{background:#00e5ff;}

/* ===========================
 CATEGORY FILTER
===========================*/
.filter-bar{
 display:flex;
 gap:12px;
 justify-content:center;
 padding:14px;
}
.filter-btn{
 padding:10px 18px;
 border-radius:20px;
 border:1px solid #32ffe2;
 background:#082635;
 cursor:pointer;
}
.filter-btn.active{
 background:#00ffd1;
 color:#002024;
}

/* ===========================
 PRODUCT CARDS + ANIMATIONS
===========================*/
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
 gap:18px;
 padding:24px;
}
.card{
 background:linear-gradient(145deg,#0b2332,#0d3143);
 border-radius:18px;
 border:1px solid #1ef2ff55;
 box-shadow:0 12px 30px rgba(0,0,0,.55);
 overflow:hidden;
 transform:translateY(20px);
 opacity:0;
}
.card.show{animation:fadeUp .6s forwards;}

@keyframes fadeUp{
 to{transform:translateY(0);opacity:1;}
}

.card img{
 width:100%;
 height:160px;
 object-fit:cover;
}
.card .info{
 padding:12px;
 font-weight:700;
}

.order-btn{
 width:100%;
 border:none;
 padding:10px;
 background:#00e5ff;
 font-weight:800;
 cursor:pointer;
}

/* ===========================
 PRODUCT MODAL
===========================*/
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.65);
 display:none;
 justify-content:center;
 align-items:center;
}
.modal-content{
 width:340px;
 border-radius:16px;
 background:#0c2a3b;
 border:1px solid #12ffd8;
 padding:16px;
}

</style>
</head>

<body>

<div class="header">
 <div>✉ BakeTimeStories@gmail.com</div>
 <div class="actions">
   <button onclick="openContact()">CONTACT</button>
   <button onclick="alert('Login popup will be added next build')">LOGIN</button>
 </div>
</div>

<!-- CATEGORY FILTER -->
<div class="filter-bar">
 <button class="filter-btn active" onclick="filterCategory('all')">All</button>
 <button class="filter-btn" onclick="filterCategory('cakes')">Cakes</button>
 <button class="filter-btn" onclick="filterCategory('brownies')">Brownies</button>
 <button class="filter-btn" onclick="filterCategory('hampers')">Hampers</button>
</div>

<!-- PRODUCT GRID -->
<!-- BAKERY CARD GRID -->
<div class="grid" id="productGrid">

  <!-- CAKES -->
  <div class="card cakes">
    <img src="https://images.pexels.com/photos/35389962/pexels-photo-35389962.jpeg">
    <div class="info">Chocolate Truffle Cake</div>
    <button class="order-btn" onclick="openProduct('Chocolate Truffle Cake')">View</button>
  </div>

  <div class="card cakes">
    <img src="https://images.pexels.com/photos/5702989/pexels-photo-5702989.jpeg">
    <div class="info">Eggless Cupcakes</div>
    <button class="order-btn" onclick="openProduct('Eggless Cupcakes')">View</button>
  </div>

  <!-- BROWNIES -->
  <div class="card brownies">
    <img src="https://images.pexels.com/photos/3026804/pexels-photo-3026804.jpeg">
    <div class="info">Brownies & Tarts</div>
    <button class="order-btn" onclick="openProduct('Brownies & Tarts')">View</button>
  </div>

  <!-- HAMPERS -->
  <div class="card hampers">
    <img src="https://images.pexels.com/photos/30727980/pexels-photo-30727980.jpeg">
    <div class="info">Gift Hampers</div>
    <button class="order-btn" onclick="openProduct('Gift Hampers')">View</button>
  </div>

</div>


<!-- CONTACT POPUP -->
<div class="popup-overlay" id="contactPopup">

 <div class="popup" id="contactBox">

  <div style="text-align:right;">
    <span onclick="closePopups()" style="cursor:pointer;">✖</span>
  </div>

  <h3>Contact Us</h3>

  <label>Name :</label>
  <input id="name">

  <label>Mobile Number :</label>
  <input id="mobile">

  <label>Requirement :</label>
  <textarea id="req"></textarea>

  <div class="popup-buttons">
    <button class="wbtn" onclick="submitWhatsApp()">WhatsApp Submit</button>
    <button class="ebtn" onclick="saveToSheet()">Email Submit</button>
  </div>

 </div>

 <!-- SUCCESS POPUP -->
 <div class="success-box" id="successBox">
  <div class="tick">✔</div>

  <h2>Thank You</h2>
  We have received your request.<br>
  We will contact you soon.

  <button onclick="closePopups()">Close</button>
 </div>

</div>

<!-- PRODUCT PREVIEW MODAL -->
<div class="modal" id="productModal">
 <div class="modal-content" id="modalContent">
   Loading...
 </div>
</div>

<script>

/* Scroll Fade Animation */
document.querySelectorAll(".card").forEach((c,i)=>{
 setTimeout(()=>c.classList.add("show"),i*120);
});

/* Category Filter */
function filterCategory(cat){
 document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
 event.target.classList.add("active");

 document.querySelectorAll(".card").forEach(c=>{
   c.style.display = (cat==="all" || c.classList.contains(cat)) ? "block":"none";
 });
}

/* Contact Popup */
function openContact(){
 document.getElementById("contactPopup").style.display="flex";
}
function closePopups(){
 document.getElementById("contactPopup").style.display="none";
 document.getElementById("successBox").style.display="none";
}

/* Product Modal */
function openProduct(name){
 document.getElementById("productModal").style.display="flex";
 document.getElementById("modalContent").innerHTML =
 `<h3>${name}</h3>
 <p>Premium handcrafted bakery item.</p>
 <button onclick="openContact()">Order Now</button>`;
}

/* WhatsApp Submit */
function submitWhatsApp(){

 let n = name.value;
 let m = mobile.value;
 let r = req.value;

 window.open(
  `https://wa.me/919000000000?text=
Name: ${n}%0AMobile:${m}%0ARequirement:${r}`,
 "_blank");

 showSuccess();
}

/* Save To Google Sheets */
function saveToSheet(){

 // Replace with your Apps Script URL
 const scriptURL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

 fetch(scriptURL,{
  method:"POST",
  body:new FormData(Object.assign(document.createElement("form"),{
   name:name.value,
   mobile:mobile.value,
   requirement:req.value
  }))
 });

 showSuccess();
}

/* Show Success Popup */
function showSuccess(){
 document.getElementById("contactBox").style.display="none";
 document.getElementById("successBox").style.display="block";
}

</script>

</body>
</html>
