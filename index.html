<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BakeTimeStories</title>

<style>

body{
 margin:0;
 font-family:"Poppins",sans-serif;
 background:linear-gradient(180deg,#ffe6f0,#fff6fc,#fff);
 color:#4a2c3a;
}

/* ===========================
 HEADER — PASTEL GLASS
===========================*/
.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:14px 26px;
 background:linear-gradient(145deg,#ffdae9b5,#ffffffaa);
 backdrop-filter:blur(14px);
 border-bottom:2px solid #ffc1dc;
 box-shadow:0 18px 35px rgba(0,0,0,.18);
}

.actions button{
 background:#ff7eb6;
 border:none;
 padding:10px 22px;
 border-radius:40px;
 font-weight:700;
 cursor:pointer;
 color:white;
 transition:.25s;
}
.actions button:hover{
 transform:translateY(-2px);
 box-shadow:0 10px 22px rgba(255,126,182,.45);
}

/* ===========================
 CATEGORY FILTER — SOFT TAGS
===========================*/
.filter-bar{
 display:flex;
 gap:12px;
 justify-content:center;
 padding:18px;
}

.filter-btn{
 padding:10px 18px;
 border-radius:20px;
 border:1px solid #ffb6d8;
 background:#fff3f9;
 cursor:pointer;
 font-weight:600;
 color:#8c3f60;
 transition:.25s;
}
.filter-btn:hover{
 background:#ffd8ec;
}
.filter-btn.active{
 background:#ff7eb6;
 color:#fff;
}

/* ===========================
 PRODUCT CARDS — BAKERY GLASS
===========================*/
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
 gap:22px;
 padding:28px 26px;
}

.card{
 background:linear-gradient(145deg,#ffffffdd,#ffe8f4cc);
 border-radius:22px;
 border:1px solid #ffd2e8;
 box-shadow:0 22px 32px rgba(0,0,0,.18);
 overflow:hidden;
 transform:translateY(20px);
 opacity:0;
}
.card.show{animation:fadeUp .6s forwards;}

@keyframes fadeUp{
 to{transform:translateY(0);opacity:1;}
}

.card img{
 width:100%;
 height:170px;
 object-fit:cover;
}

.card .info{
 padding:12px;
 font-weight:800;
 color:#4a2c3a;
}

.order-btn{
 width:100%;
 border:none;
 padding:12px;
 background:#ff7eb6;
 color:#fff;
 font-weight:800;
 cursor:pointer;
 transition:.25s;
}
.order-btn:hover{
 background:#ff5ca5;
}

/* ===========================
 CONTACT FORM POPUP — FROSTED
===========================*/
.popup-overlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.45);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:999;
}

.popup{
 width:360px;
 padding:18px;
 background:linear-gradient(145deg,#ffffffcc,#ffe6f4c5);
 border-radius:20px;
 border:1.4px solid #ffc9e6;
 backdrop-filter:blur(14px);
 box-shadow:0 22px 40px rgba(0,0,0,.35);
 animation:pop .35s ease;
}

@keyframes pop{
 from{transform:scale(.85);opacity:0;}
 to{transform:scale(1);opacity:1;}
}

.popup h3{
 text-align:center;
 color:#8c3f60;
 margin-top:0;
}

.popup label{
 font-weight:700;
 color:#5a3043;
}

.popup input,
.popup textarea{
 width:100%;
 margin-top:6px;
 padding:10px;
 border-radius:12px;
 border:1px solid #ffcfe7;
 background:#fff8fc;
 outline:none;
 color:#4a2c3a;
}

.popup textarea{min-height:80px;}

.popup-buttons button{
 width:100%;
 margin-top:10px;
 padding:12px;
 border-radius:14px;
 border:none;
 font-weight:800;
 cursor:pointer;
}

.wbtn{background:#31d47b;color:#fff;}
.ebtn{background:#ff7eb6;color:#fff;}

/* ===========================
 SUCCESS POPUP — PASTEL GLASS
===========================*/
.success-box{
 display:none;
 width:360px;
 padding:24px;
 text-align:center;
 border-radius:20px;
 background:linear-gradient(145deg,#ffffffd8,#eafff4d3);
 border:1.5px solid #b6ffd9;
 backdrop-filter:blur(16px);
 box-shadow:0 18px 35px rgba(0,0,0,.35);
 animation:pop .35s ease;
}

.tick{
 font-size:48px;
 color:#23c46a;
}

.success-box h2{
 margin:8px 0;
 color:#3b6b4a;
}

.success-box button{
 margin-top:12px;
 padding:10px 20px;
 border-radius:14px;
 border:none;
 background:#ff7eb6;
 color:#fff;
 font-weight:700;
 cursor:pointer;
}

/* ===========================
 PRODUCT MODAL — GLASS CARD
===========================*/
.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.45);
 display:none;
 justify-content:center;
 align-items:center;
}

.modal-content{
 width:340px;
 border-radius:18px;
 background:linear-gradient(145deg,#ffffffdd,#fff1f8c9);
 border:1px solid #ffcfe7;
 padding:16px;
}

</style>
</head>

<body>

<div class="header">
 <div>✉ BakeTimeStories@gmail.com</div>

 <div class="actions">
   <button onclick="openContact()">CONTACT</button>
   <button onclick="alert('Login popup will be added')">LOGIN</button>
 </div>
</div>

<!-- CATEGORY FILTER -->
<div class="filter-bar">
 <button class="filter-btn active" onclick="filterCategory('all')">All</button>
 <button class="filter-btn" onclick="filterCategory('cakes')">Cakes</button>
 <button class="filter-btn" onclick="filterCategory('brownies')">Brownies</button>
 <button class="filter-btn" onclick="filterCategory('hampers')">Hampers</button>
</div>

<!-- PRODUCT GRID -->
<div class="grid" id="productGrid">

 <!-- CAKES -->
 <div class="card cakes">
  <img src="https://images.pexels.com/photos/35389962/pexels-photo-35389962.jpeg">
  <div class="info">Chocolate Truffle Cake</div>
  <button class="order-btn" onclick="openProduct('Chocolate Truffle Cake')">View</button>
 </div>

 <div class="card cakes">
  <img src="https://images.pexels.com/photos/5702989/pexels-photo-5702989.jpeg">
  <div class="info">Eggless Cupcakes</div>
  <button class="order-btn" onclick="openProduct('Eggless Cupcakes')">View</button>
 </div>

 <!-- BROWNIES -->
 <div class="card brownies">
  <img src="https://images.pexels.com/photos/3026804/pexels-photo-3026804.jpeg">
  <div class="info">Brownies & Tarts</div>
  <button class="order-btn" onclick="openProduct('Brownies & Tarts')">View</button>
 </div>

 <!-- HAMPERS -->
 <div class="card hampers">
  <img src="https://images.pexels.com/photos/30727980/pexels-photo-30727980.jpeg">
  <div class="info">Gift Hampers</div>
  <button class="order-btn" onclick="openProduct('Gift Hampers')">View</button>
 </div>

</div>

<!-- CONTACT POPUP -->
<div class="popup-overlay" id="contactPopup">

 <div class="popup" id="contactBox">

  <div style="text-align:right;">
    <span onclick="closePopups()" style="cursor:pointer;">✖</span>
  </div>

  <h3>Contact Us</h3>

  <label>Name :</label>
  <input id="name">

  <label>Mobile Number :</label>
  <input id="mobile">

  <label>Requirement :</label>
  <textarea id="req"></textarea>

  <div class="popup-buttons">
    <button class="wbtn" onclick="submitWhatsApp()">WhatsApp Submit</button>
    <button class="ebtn" onclick="saveToSheet()">Email Submit</button>
  </div>

 </div>

 <!-- SUCCESS -->
 <div class="success-box" id="successBox">
  <div class="tick">✔</div>

  <h2>Thank You</h2>
  We have received your request.<br>
  We will contact you soon.

  <button onclick="closePopups()">Close</button>
 </div>

</div>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal">
 <div class="modal-content" id="modalContent">Loading...</div>
</div>

<script>

/* Scroll-in animation */
document.querySelectorAll(".card").forEach((c,i)=>{
 setTimeout(()=>c.classList.add("show"),i*120);
});

/* Category Filter */
function filterCategory(cat){
 document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
 event.target.classList.add("active");

 document.querySelectorAll(".card").forEach(c=>{
   c.style.display = (cat==="all" || c.classList.contains(cat)) ? "block":"none";
 });
}

/* Contact Popup */
function openContact(){
 document.getElementById("contactPopup").style.display="flex";
}
function closePopups(){
 document.getElementById("contactPopup").style.display="none";
 document.getElementById("successBox").style.display="none";
}

/* Product Modal */
function openProduct(name){
 document.getElementById("productModal").style.display="flex";
 document.getElementById("modalContent").innerHTML =
 `<h3>${name}</h3>
 <p>Freshly baked, handcrafted & eggless.</p>
 <button onclick="openContact()">Order Now</button>`;
}

/* WhatsApp Submit */
function submitWhatsApp(){
 let n = name.value;
 let m = mobile.value;
 let r = req.value;

 window.open(
 `https://wa.me/919000000000?text=
Name: ${n}%0AMobile:${m}%0ARequirement:${r}`,
 "_blank");

 showSuccess();
}

/* Google Sheets Hook */
function saveToSheet(){
 const scriptURL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

 fetch(scriptURL,{
  method:"POST",
  body:new FormData(Object.assign(document.createElement("form"),{
   name:name.value,
   mobile:mobile.value,
   requirement:req.value
  }))
 });

 showSuccess();
}

/* Success Popup */
function showSuccess(){
 document.getElementById("contactBox").style.display="none";
 document.getElementById("successBox").style.display="block";
}

</script>

</body>
</html>
